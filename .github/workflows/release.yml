name: Release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-me:
    name: Create Github Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.print.outputs.version }}
    steps:
      - name: Run ReleaseMe
        id: release
        uses: dev-build-deploy/release-me@435945aa4b04df46fe9b0eb4c310706c1bd228a6 # v0.18.2
        with:
          token: ${{ github.token }}

      - if: ${{ steps.release.outputs.created }}
        id: print
        run: echo "version=${{ fromJSON(steps.release.outputs.release).tag_name }}" >> "$GITHUB_OUTPUT"

  publish:
    needs: release-me
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - run: 'sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json'
        env:
          VERSION: ${{ needs.release-me.outputs.version }}
      - run: "bun install"
      - run: "(cd playground && bun install)"
      - run: "bun run dev:prepare"
      - run: "bun run prepack"
      - run: "npm publish --provenance --access public"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
